<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueGames</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f5f7fb;color:#222}
header{
  background:white;
  padding:80px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.ribbon{
  position:absolute;
  top:0;left:0;right:0;
  height:12px;
  background:#1e63ff;
}
.hero h1{font-size:3rem;margin:0;color:#1e63ff}
.hero p{max-width:700px;margin:20px auto}
.btn{background:#1e63ff;color:white;padding:12px 22px;border-radius:8px;text-decoration:none}
nav{background:#1e63ff;padding:15px;text-align:center}
nav a{color:white;text-decoration:none;margin:0 15px}
.container{max-width:1200px;margin:auto;padding:40px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card img{width:100%;border-radius:8px}
.download{display:inline-block;margin-top:10px;background:#1e63ff;color:white;padding:10px 16px;border-radius:6px;text-decoration:none}
footer{background:#0f172a;color:white;text-align:center;padding:30px}

/* ===== LOADING SCREEN ===== */
#loader{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#0d0d1a 0%,#1a0a2e 50%,#0f172a 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:99999;
  transition:opacity .7s ease, visibility .7s ease;
}
#loader.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
.loader-logo{
  width:130px;
  height:130px;
  border-radius:28px;
  animation:logoPulse 1.6s ease-in-out infinite;
  filter:drop-shadow(0 0 28px rgba(120,60,220,.7));
  object-fit:cover;
}
.loader-subtitle{ color:rgba(255,255,255,.5); font-size:13px; margin-top:14px; letter-spacing:2px; text-transform:uppercase; }
.loader-bar-wrap{
  width:220px; height:3px; background:rgba(255,255,255,.1);
  border-radius:99px; margin-top:28px; overflow:hidden;
}
.loader-bar{
  height:100%; width:0;
  background:linear-gradient(90deg,#3b82f6,#a855f7,#ec4899);
  border-radius:99px; animation:barFill 2s ease forwards;
}
.loader-dots{ display:flex; gap:8px; margin-top:20px; }
.loader-dots span{ width:7px; height:7px; border-radius:50%; animation:dotBounce 1.2s ease-in-out infinite; }
.loader-dots span:nth-child(1){ background:#3b82f6; }
.loader-dots span:nth-child(2){ background:#a855f7; animation-delay:.2s; }
.loader-dots span:nth-child(3){ background:#ec4899; animation-delay:.4s; }
@keyframes logoPulse{
  0%,100%{ transform:scale(1); filter:drop-shadow(0 0 24px rgba(160,60,255,.55)); }
  50%{ transform:scale(1.04); filter:drop-shadow(0 0 40px rgba(236,72,153,.7)); }
}
@keyframes barFill{ 0%{ width:0; } 60%{ width:75%; } 100%{ width:100%; } }
@keyframes dotBounce{
  0%,100%{ transform:translateY(0); opacity:.4; }
  50%{ transform:translateY(-7px); opacity:1; }
}
</style>
</head>
